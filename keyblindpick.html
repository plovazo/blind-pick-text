<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvZ Blind Selector</title>
    <style>
        :root {
            --plant-color: #4CAF50;
            --zombie-color: #9C27B0;
            --bg-color: #2b2b2b;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* Top Bar & Slots */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a1a1a;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .slot-container {
            display: flex;
            gap: 10px;
        }

        .slot {
            width: 70px;
            height: 70px;
            border: 2px dashed #555;
            border-radius: 8px;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Typography & Buttons */
        .description {
            font-size: 1.1rem;
            max-width: 800px;
            margin: 0 auto 20px auto;
            line-height: 1.5;
            color: #cccccc;
        }

        .action-btn {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 30px;
        }

        .action-btn:hover {
            background-color: #1976D2;
        }

        /* Main Grid Layout */
        .main-layout {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .side-panel {
            flex: 1;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            max-width: 45%;
        }

        .side-panel h2 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .plants-panel h2 { color: var(--plant-color); }
        .zombies-panel h2 { color: var(--zombie-color); }

        .unit-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .unit {
            width: 60px;
            height: 60px;
            background-color: #333;
            border-radius: 5px;
            border: 2px solid #444;
            overflow: hidden;
        }

        .unit img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .unit img:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Top Bar: Selected Slots -->
    <div class="top-bar">
        <div class="slot-container" id="plant-slots">
            <!-- Slots generated by JS -->
        </div>
        
        <h2>VS</h2>
        
        <div class="slot-container" id="zombie-slots">
            <!-- Slots generated by JS -->
        </div>
    </div>

    <!-- Explanatory Text -->
    <p class="description">
        Welcome to the Blind Selector. Click the button below to randomly draft 5 Plants and 5 Zombies for your next matchup. The available roster is displayed below.
    </p>

    <button class="action-btn" onclick="triggerBlindSelection()">Conduct Blind Selection</button>

    <!-- Main Content: All Units -->
    <div class="main-layout">
        <!-- Plants Side -->
        <div class="side-panel plants-panel">
            <h2>Plants Roster (32)</h2>
            <div class="unit-grid" id="plants-roster"></div>
        </div>

        <!-- Zombies Side -->
        <div class="side-panel zombies-panel">
            <h2>Zombies Roster (18)</h2>
            <div class="unit-grid" id="zombies-roster"></div>
        </div>
    </div>

    <script>
        // Configuration: Change ".png" to ".jpg" or ".gif" if your files differ.
        const TOTAL_PLANTS = 32;
        const TOTAL_ZOMBIES = 18;
        const PLANT_DIR = 'Plant_Images/';
        const ZOMBIE_DIR = 'Zombie_Images/';
        const EXTENSION = '.png'; 

        // Generate Arrays of Image Paths
        const plantImages = Array.from({length: TOTAL_PLANTS}, (_, i) => `${PLANT_DIR}${i + 1}${EXTENSION}`);
        const zombieImages = Array.from({length: TOTAL_ZOMBIES}, (_, i) => `${ZOMBIE_DIR}${i + 1}${EXTENSION}`);

        // Initialize the UI on load
        window.onload = () => {
            createSlots('plant-slots', 5);
            createSlots('zombie-slots', 5);
            populateRoster('plants-roster', plantImages);
            populateRoster('zombies-roster', zombieImages);
        };

        // Creates empty slots in the top bar
        function createSlots(containerId, count) {
            const container = document.getElementById(containerId);
            for(let i=0; i<count; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                container.appendChild(slot);
            }
        }

        // Populates the bottom grids with all available units
        function populateRoster(containerId, imageArray) {
            const container = document.getElementById(containerId);
            imageArray.forEach(src => {
                const unitDiv = document.createElement('div');
                unitDiv.className = 'unit';
                const img = document.createElement('img');
                img.src = src;
                img.alt = 'Unit image';
                // Fallback if image isn't found
                img.onerror = function() { this.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM1NTVkNTAiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1zaXplPSIxMiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgYWxpZ25tZW50LWJhc2VsaW5lPSJtaWRkbGUiIGZpbGw9IiNmZmYiPj88L3RleHQ+PC9zdmc+'; };
                unitDiv.appendChild(img);
                container.appendChild(unitDiv);
            });
        }

        // Main Randomizer Logic
        function triggerBlindSelection() {
            // Get 5 unique random indices for plants
            const selectedPlants = getRandomUniqueElements(plantImages, 5);
            const selectedZombies = getRandomUniqueElements(zombieImages, 5);

            updateSlots('plant-slots', selectedPlants);
            updateSlots('zombie-slots', selectedZombies);
        }

        // Helper: Pick N unique elements from an array
        function getRandomUniqueElements(arr, num) {
            const shuffled = [...arr].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, num);
        }

        // Updates the top bar slots with the chosen images
        function updateSlots(containerId, selectedImages) {
            const container = document.getElementById(containerId);
            const slots = container.getElementsByClassName('slot');
            
            for(let i=0; i<slots.length; i++) {
                slots[i].innerHTML = `<img src="${selectedImages[i]}" alt="Selected Unit">`;
            }
        }
    </script>
</body>
</html>
