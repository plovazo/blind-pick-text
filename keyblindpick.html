<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvZ Versus Mode Blind Draft</title>
    <style>
        :root {
            --plant-color: #4CAF50;
            --zombie-color: #9C27B0;
            --bg-color: #2b2b2b;
            --text-color: #ffffff;
            --disabled-color: #555555;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* Top Bar & Slots */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a1a1a;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .slot-container {
            display: flex;
            gap: 10px;
        }

        .slot {
            width: 80px;
            height: 110px;
            border: 2px dashed #555;
            border-radius: 8px;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .slot img { ////////////////////////////////////////////////////////////////////////////
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .slot.clickable {
            cursor: pointer;
            border-color: #aaa;
        }
        .slot.clickable:hover {
            border-color: #fff;
        }

        /* Typography & Buttons */
        .description {
            font-size: 1.1rem;
            max-width: 800px;
            margin: 0 auto 20px auto;
            line-height: 1.5;
            color: #cccccc;
        }

        .action-btn {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            margin-bottom: 30px;
        }

        .action-btn:hover:not(:disabled) {
            background-color: #1976D2;
        }

        .action-btn:disabled {
            background-color: var(--disabled-color);
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Main Grid Layout */
        .main-layout {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .side-panel {
            flex: 1;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            max-width: 45%;
            transition: opacity 0.3s;
        }

        .side-panel.disabled-panel {
            opacity: 0.4;
            pointer-events: none;
        }

        .side-panel h2 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .plants-panel h2 { color: var(--plant-color); }
        .zombies-panel h2 { color: var(--zombie-color); }

        .unit-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .unit { ////////////////////////////////////////////////////////////////////
            width: 80px;
            height: 100px;
            background-color: #333;
            border-radius: 5px;
            border: 2px solid #444;
            overflow: hidden;
            position: relative;
        }

        .plants-panel .unit {
            cursor: pointer;
        }

        .plants-panel .unit:hover img {
            opacity: 1;
            transform: scale(1.05);
        }

        .unit img { ////////////////////////////////////////////////////
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.9;
            transition: opacity 0.2s, transform 0.1s;
        }
        
        .unit.selected {
            border-color: #fff;
            opacity: 0.3;
            pointer-events: none;
        }

        /* Alphabet Overlay for Zombies */
        .zombie-letter {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 2px black, -1px -1px 2px black, 1px -1px 2px black, -1px 1px 2px black;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="slot-container" id="plant-slots"></div>
        <h2>VS</h2>
        <div class="slot-container" id="zombie-slots"></div>
    </div>

    <p class="description" id="status-text">
        <strong>Phase 1: Zombie Draft.</strong> Press the corresponding letter on your keyboard (A-R) to secretly draft a zombie. Press <strong>Backspace</strong> to undo your last pick. Press <strong>Enter</strong> to confirm your full deck.
    </p>

    <button id="main-btn" class="action-btn" onclick="advancePhase()" disabled>Confirm Zombie Deck</button>

    <div class="main-layout">
        <div class="side-panel plants-panel disabled-panel" id="plant-panel">
            <h2>Plants Roster</h2>
            <div class="unit-grid" id="plants-roster"></div>
        </div>

        <div class="side-panel zombies-panel" id="zombie-panel">
            <h2>Zombies Roster</h2>
            <div class="unit-grid" id="zombies-roster"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURATION & CUSTOM ARRAYS
        // ==========================================
        const PLANT_DIR = 'Plant_Images/';
        const ZOMBIE_DIR = 'Zombie_Images/';
        
        const MYSTERY_ICON = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM0NDQiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1zaXplPSIyNCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSJib2xkIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBhbGlnbm1lbnQtYmFzZWxpbmU9Im1pZGRsZSIgZmlsbD0iI2ZmZiI+PzwvdGV4dD48L3N2Zz4=';

        const plantFilenames = [
            "Peashooter.png", "CherryBomb.png", "WallNut.png", "PotatoMine.png", "Snowpea.png", "Chomper.png", "Repeater.png", "PuffShroom.png",
            "SunShroom.png", "FumeShroom.png", "GraveBuster.png", "HypnoShroom.png", "ScaredyShroom.png", "IceShroom.png", "DoomShroom.png", "Squash.png",
            "Threepeater.png", "Jalapeno.png", "Spikeweed.png", "Torchwood.png", "TallNut.png", "Cactus.png", "SplitPea.png", "Starfruit.png",
            "Pumpkin.png", "MagnetShroom.png", "CabbagePult.png", "KernelPult.png", "CoffeeBean.png", "Garlic.png", "UmbrellaLeaf.png", "MelonPult.png"
        ];

        const zombieFilenames = [
                "Basic.png", "Trashcan.png", "Cone.png", "PoleVaulting.png","Bucket.png","Flag.png","Newspaper.png",
                "ScreenDoor.png","Football.png","Dancing.png","Zomboni.png",
                "JackInTheBox.png","Digger.png","Pogo.png","Bungee.png","Ladder.png","Catapult.png","Gargantuar.png"
        ];

        // ==========================================
        // 2. STATE MANAGEMENT
        // ==========================================
        let currentPhase = 'zombie_draft'; 
        let draftedZombies = [];
        let draftedPlants = [];

        // ==========================================
        // 3. INITIALIZATION & KEYBOARD CONTROLS
        // ==========================================
        window.onload = () => {
            renderRoster('plants-roster', plantFilenames, PLANT_DIR, 'plant');
            renderRoster('zombies-roster', zombieFilenames, ZOMBIE_DIR, 'zombie');
            renderTopSlots();
        };

        // Keyboard listener for Zombie Draft Phase
        document.addEventListener('keydown', (e) => {
            if (currentPhase === 'zombie_draft') {
                const key = e.key.toUpperCase();

                // Handle Backspace (Undo)
                if (key === 'BACKSPACE') {
                    if (draftedZombies.length > 0) {
                        draftedZombies.pop();
                        renderTopSlots();
                    }
                    return;
                }

                // Handle Enter (Confirm Deck)
                if (key === 'ENTER') {
                    if (draftedZombies.length === 5) {
                        advancePhase();
                    }
                    return;
                }

                // Handle Alphabet Selection (A-R)
                const charCode = key.charCodeAt(0);
                if (key.length === 1 && charCode >= 65 && charCode < 65 + zombieFilenames.length) {
                    const index = charCode - 65;
                    const fullPath = ZOMBIE_DIR + zombieFilenames[index];
                    
                    if (draftedZombies.length < 5 && !draftedZombies.includes(fullPath)) {
                        draftedZombies.push(fullPath);
                        renderTopSlots(); // Update the UI with mystery icons
                    }
                }
            }
        });

        // ==========================================
        // 4. RENDERING FUNCTIONS
        // ==========================================
        function renderRoster(containerId, filenames, directory, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 

            filenames.forEach((filename, index) => {
                const fullPath = directory + filename;
                const unitDiv = document.createElement('div');
                unitDiv.className = 'unit';
                
                // Only allow clicking for plants
                if (type === 'plant') {
                    unitDiv.onclick = () => selectUnit(fullPath, type);
                }

                const img = document.createElement('img');
                img.src = fullPath;
                img.alt = filename;
                img.onerror = function() { this.src = MYSTERY_ICON; };
                unitDiv.appendChild(img);

                if (type === 'zombie') {
                    const letterSpan = document.createElement('span');
                    letterSpan.className = 'zombie-letter';
                    letterSpan.innerText = String.fromCharCode(65 + index); 
                    unitDiv.appendChild(letterSpan);
                }

                // Only mark plants as visually selected (maintains zombie secrecy)
                if (type === 'plant' && draftedPlants.includes(fullPath)) {
                    unitDiv.classList.add('selected');
                }

                container.appendChild(unitDiv);
            });
        }

        function renderTopSlots() {
            renderSideSlots('plant-slots', draftedPlants, 'plant');
            renderSideSlots('zombie-slots', draftedZombies, 'zombie');
            checkButtonState();
        }

        function renderSideSlots(containerId, draftArray, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            for (let i = 0; i < 5; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';

                if (draftArray[i]) {
                    const img = document.createElement('img');
                    
                    if (type === 'zombie' && currentPhase !== 'reveal') {
                        img.src = MYSTERY_ICON;
                    } else {
                        img.src = draftArray[i];
                    }
                    slot.appendChild(img);

                    // Add click-to-remove logic ONLY for plants
                    if (type === 'plant' && currentPhase === 'plant_draft') {
                        slot.classList.add('clickable');
                        slot.onclick = () => removeUnit(i, 'plant');
                    }
                }
                container.appendChild(slot);
            }
        }

        // ==========================================
        // 5. GAME LOGIC
        // ==========================================
        function selectUnit(fullPath, type) {
            if (type === 'plant' && currentPhase === 'plant_draft') {
                if (draftedPlants.length < 5 && !draftedPlants.includes(fullPath)) {
                    draftedPlants.push(fullPath);
                    renderRoster('plants-roster', plantFilenames, PLANT_DIR, 'plant');
                    renderTopSlots();
                }
            }
        }

        function removeUnit(index, type) {
            if (type === 'plant' && currentPhase === 'plant_draft') {
                draftedPlants.splice(index, 1);
                renderRoster('plants-roster', plantFilenames, PLANT_DIR, 'plant');
            }
            renderTopSlots();
        }

        function checkButtonState() {
            const btn = document.getElementById('main-btn');
            if (currentPhase === 'zombie_draft') {
                btn.disabled = draftedZombies.length !== 5;
            } else if (currentPhase === 'plant_draft') {
                btn.disabled = draftedPlants.length !== 5;
            }
        }

        function advancePhase() {
            const btn = document.getElementById('main-btn');
            const statusText = document.getElementById('status-text');
            const zombiePanel = document.getElementById('zombie-panel');
            const plantPanel = document.getElementById('plant-panel');

            if (currentPhase === 'zombie_draft') {
                currentPhase = 'plant_draft';
                zombiePanel.classList.add('disabled-panel');
                plantPanel.classList.remove('disabled-panel');
                
                statusText.innerHTML = "<strong>Phase 2: Plant Draft.</strong> The Plant player may now click to choose 5 units. Click the top slots to un-select them.";
                btn.innerText = "Reveal Both Decks";
                
                renderTopSlots(); 
                
            } else if (currentPhase === 'plant_draft') {
                currentPhase = 'reveal';
                plantPanel.classList.add('disabled-panel');
                
                statusText.innerHTML = "<strong>Phase 3: The Matchup!</strong> Both decks are revealed. Good luck.";
                btn.style.display = 'none'; 
                
                renderTopSlots(); 
            }
        }
    </script>
</body>
</html>
